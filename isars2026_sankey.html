<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ISARS 2026 · 연구자 출신 → 연구 대상 지역</title>
<style>
  :root{
    --bg:#f4f1ea; --ink:#2e2a26; --muted:#8a8278; --line:#d8d2c6; --neutral:#aaa294;
  }
  *{box-sizing:border-box;}
  .sk-wrap{
    background:var(--bg); color:var(--ink);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
    padding:26px 22px 22px; max-width:1060px; margin:0 auto; -webkit-font-smoothing:antialiased;
  }
  .sk-title{font-size:25px; font-weight:800; letter-spacing:-.01em; margin:0 0 6px;}
  .sk-sub{font-size:13.5px; color:var(--muted); margin:0 0 14px; line-height:1.55;}
  .sk-bar{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:8px;}
  .sk-hint{font-size:12.5px; color:var(--muted);}
  .sk-reset{
    cursor:pointer; border:1.5px solid var(--line); border-radius:999px;
    padding:5px 13px; font-size:12.5px; font-weight:600; background:transparent;
    color:var(--muted); transition:all .18s ease; font-family:inherit;
  }
  .sk-reset:hover{border-color:var(--ink); color:var(--ink);}
  .sk-reset.live{border-color:var(--ink); color:var(--ink);}
  .sk-cap{font-size:13.5px; color:var(--muted); margin:6px 0 6px; line-height:1.6; min-height:22px;}
  .sk-cap b{color:var(--ink); font-weight:700;}
  .sk-cap .arrow{color:var(--muted); margin:0 4px;}
  .sk-plot{position:relative; width:100%;}
  .sk-svg{width:100%; height:auto; display:block; overflow:visible; touch-action:manipulation;}
  .ribbon{transition:opacity .28s ease, fill-opacity .28s ease; cursor:pointer;}
  .ribbon.dim{opacity:0 !important; pointer-events:none;}
  .node{cursor:pointer;}
  .node rect{transition:opacity .28s ease;}
  .nlabel{transition:opacity .28s ease;}
  .faded{opacity:.22;}
  .hdr{font-size:12.5px; font-weight:700;}
  .nname{font-size:13px; fill:var(--ink);}
  .nnum{font-size:11.5px; fill:var(--muted);}
  .sk-tip{
    position:absolute; pointer-events:none; z-index:20; opacity:0; transform:translateY(2px);
    transition:opacity .1s ease; background:#2e2a26; color:#f4f1ea; border-radius:8px;
    padding:7px 10px; font-size:12.5px; line-height:1.4; white-space:nowrap;
    box-shadow:0 6px 22px rgba(0,0,0,.22);
  }
  .sk-tip.show{opacity:1;}
  .sk-tip b{font-weight:700;}
  .sk-foot{font-size:12px; color:var(--muted); margin-top:12px; text-align:center; line-height:1.5;}
  @media (max-width:680px){
    .sk-wrap{padding:18px 12px;}
    .sk-title{font-size:20px;}
    .sk-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .sk-scroll .sk-plot{min-width:720px;}
  }
</style>
</head>
<body>
<div class="sk-wrap">
  <h1 class="sk-title">연구자 국적(소속)과 연구 대상 지역의 연결</h1>
  <p class="sk-sub">리본 두께는 인원 수(명)에 비례합니다. 한국 출신은 대부분 한국을 연구하고, 유럽·서구만 아시아를 비롯한 바깥으로 넓게 흩어집니다.</p>

  <div class="sk-bar">
    <span class="sk-hint">왼쪽 출신 권역(또는 오른쪽 대상 지역)을 누르면 그 흐름만 남습니다.</span>
    <button class="sk-reset" id="skReset">전체 보기</button>
  </div>
  <div class="sk-cap" id="skCap"></div>

  <div class="sk-scroll">
    <div class="sk-plot" id="skPlot">
      <svg class="sk-svg" id="skSvg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="연구자 출신 권역에서 연구 대상 지역으로의 흐름도"></svg>
      <div class="sk-tip" id="skTip"></div>
    </div>
  </div>

  <p class="sk-foot">ISARS 2026 서울 대회 구두발표 166명(국적 미상 1명 제외) · 데이터: 프로그램북 기반 자체 코딩</p>
</div>

<script>
const S = {"origins":["한국","유럽·서구","중화권","동남아","북미","남아시아","몽골·시베리아","라틴아메리카","아프리카","중동"],"targets":["한국","중화권","동남아","몽골·시베리아","비교·이론","남아시아","유럽·서구","라틴아메리카","아프리카","중동"],"otot":[60,41,19,13,11,7,7,5,2,1],"ttot":[63,21,16,16,13,13,11,8,4,1],"flows":[[0,0,55],[0,1,1],[0,3,1],[0,4,3],[1,0,4],[1,1,1],[1,2,2],[1,3,5],[1,4,7],[1,5,5],[1,6,9],[1,7,4],[1,8,3],[1,9,1],[2,1,18],[2,2,1],[3,2,13],[4,0,3],[4,1,1],[4,3,3],[4,4,2],[4,5,1],[4,6,1],[5,5,7],[6,3,7],[7,4,1],[7,7,4],[8,6,1],[8,8,1],[9,0,1]]};
const OCOL = ["#3d8b7c", "#8b7bc4", "#cf7d5f", "#d6a02e", "#5786a8", "#9a9150", "#b07e5a", "#d4628a", "#6f9442", "#6e6033"];
const NEUTRAL = '#aaa294';

const O = S.origins, T = S.targets, OTOT = S.otot, TTOT = S.ttot, FLOWS = S.flows;
const TOTAL = OTOT.reduce((a,b)=>a+b,0);

// layout
const TOP=80, BOT=676, NG=7, NW=13;
const NXL=158, NXR=838;            // left/right bar left edges
const xL=NXL+NW, xR=NXR;            // ribbon attach x
const areaH = (BOT-TOP) - NG*(O.length-1);
const scale = areaH/TOTAL;

// node rects
function stack(tots, x){
  let y=TOP, arr=[];
  tots.forEach(v=>{const h=v*scale; arr.push({y,h,x}); y+=h+NG;});
  return arr;
}
const LN = stack(OTOT, NXL);   // left nodes
const RN = stack(TTOT, NXR);   // right nodes

// build flow objects with left/right bands
const flows = FLOWS.map(([o,t,v])=>({o,t,v}));
// left bands: per origin, sorted by target
const oCur = LN.map(n=>n.y);
[...Array(O.length).keys()].forEach(o=>{
  flows.filter(f=>f.o===o).sort((a,b)=>a.t-b.t).forEach(f=>{
    f.y0L=oCur[o]; f.y1L=oCur[o]+f.v*scale; oCur[o]=f.y1L;
  });
});
// right bands: per target, sorted by origin
const tCur = RN.map(n=>n.y);
[...Array(T.length).keys()].forEach(t=>{
  flows.filter(f=>f.t===t).sort((a,b)=>a.o-b.o).forEach(f=>{
    f.y0R=tCur[t]; f.y1R=tCur[t]+f.v*scale; tCur[t]=f.y1R;
  });
});

const SVG='http://www.w3.org/2000/svg';
const svg=document.getElementById('skSvg');
function el(tag,a){const e=document.createElementNS(SVG,tag);for(const k in a)e.setAttribute(k,a[k]);return e;}
function ribPath(f){
  const mx=(xL+xR)/2;
  return `M${xL},${f.y0L} C${mx},${f.y0L} ${mx},${f.y0R} ${xR},${f.y0R} `+
         `L${xR},${f.y1R} C${mx},${f.y1R} ${mx},${f.y1L} ${xL},${f.y1L} Z`;
}

// column headers
const h1=el('text',{x:NXL,y:TOP-24,class:'hdr','text-anchor':'start',fill:OCOL[0]});
h1.textContent='연구자 출신(소속 권역)'; svg.appendChild(h1);
const h2=el('text',{x:NXR+NW,y:TOP-24,class:'hdr','text-anchor':'end',fill:'#7d756a'});
h2.textContent='연구 대상 지역'; svg.appendChild(h2);

// ribbons (draw thick first)
const ribEls=[];
flows.map((f,i)=>({f,i})).sort((a,b)=>b.f.v-a.f.v).forEach(({f,i})=>{
  const p=el('path',{d:ribPath(f),fill:OCOL[f.o],'fill-opacity':0.46,stroke:'none',class:'ribbon'});
  p.dataset.o=f.o; p.dataset.t=f.t; p.dataset.v=f.v;
  svg.appendChild(p); ribEls[i]=p;
});

// nodes + labels
const leftNodeEls=[], rightNodeEls=[], leftLabEls=[], rightLabEls=[];
function drawNodes(nodes,tots,names,side,color){
  const groups=[], labs=[];
  // initial label centers
  const centers=nodes.map(n=>n.y+n.h/2);
  // de-collide top->bottom
  const minSep=16;
  for(let i=1;i<centers.length;i++){ if(centers[i]<centers[i-1]+minSep) centers[i]=centers[i-1]+minSep; }
  nodes.forEach((n,i)=>{
    const g=el('g',{class:'node'}); g.dataset.side=side; g.dataset.idx=i;
    const fill = side==='L' ? color[i] : NEUTRAL;
    g.appendChild(el('rect',{x:n.x,y:n.y,width:NW,height:Math.max(n.h,1.5),rx:1.5,fill:fill}));
    svg.appendChild(g); groups.push(g);
    // label
    const lx = side==='L' ? n.x-9 : n.x+NW+9;
    const anc = side==='L' ? 'end' : 'start';
    const tx=el('text',{x:lx,y:centers[i]+4,'text-anchor':anc,class:'nlabel'});
    const t1=el('tspan',{class:'nname'}); t1.textContent=names[i];
    const t2=el('tspan',{class:'nnum',dx:6}); t2.textContent=tots[i]+'명';
    if(side==='L'){ tx.appendChild(t2); tx.appendChild(t1); // count then name? keep name-first visually
                    tx.textContent=''; tx.appendChild(t1); tx.appendChild(t2); }
    else { tx.appendChild(t1); tx.appendChild(t2); }
    svg.appendChild(tx); labs.push(tx);
  });
  return {groups,labs};
}
const Lg=drawNodes(LN,OTOT,O,'L',OCOL); leftNodeEls.push(...Lg.groups); leftLabEls.push(...Lg.labs);
const Rg=drawNodes(RN,TTOT,T,'R',OCOL); rightNodeEls.push(...Rg.groups); rightLabEls.push(...Rg.labs);

// ---------- interaction ----------
let sel=null; // {side:'L'|'R', idx}
const cap=document.getElementById('skCap');
const resetBtn=document.getElementById('skReset');

function involved(side,idx){
  if(side==='L'){
    const ts=new Set(), brk=[];
    flows.filter(f=>f.o===idx).sort((a,b)=>b.v-a.v).forEach(f=>{ts.add(f.t);brk.push([T[f.t],f.v]);});
    return {opp:ts, brk};
  } else {
    const os=new Set(), brk=[];
    flows.filter(f=>f.t===idx).sort((a,b)=>b.v-a.v).forEach(f=>{os.add(f.o);brk.push([O[f.o],f.v]);});
    return {opp:os, brk};
  }
}

function render(){
  if(!sel){
    ribEls.forEach(p=>{p.classList.remove('dim'); p.setAttribute('fill-opacity',0.46);});
    [...leftNodeEls,...rightNodeEls].forEach(g=>g.querySelector('rect').style.opacity=1);
    [...leftLabEls,...rightLabEls].forEach(t=>t.classList.remove('faded'));
    resetBtn.classList.remove('live');
    cap.innerHTML='전체 <b>'+TOTAL+'명</b>의 흐름입니다. 한 권역을 누르면 그 권역의 연구 대상 분포만 남습니다.';
    return;
  }
  resetBtn.classList.add('live');
  const {opp,brk}=involved(sel.side,sel.idx);
  ribEls.forEach(p=>{
    const match = sel.side==='L' ? (+p.dataset.o===sel.idx) : (+p.dataset.t===sel.idx);
    if(match){p.classList.remove('dim'); p.setAttribute('fill-opacity',0.82);}
    else p.classList.add('dim');
  });
  // nodes
  leftNodeEls.forEach((g,i)=>{
    const keep = sel.side==='L' ? (i===sel.idx) : opp.has(i);
    g.querySelector('rect').style.opacity = keep?1:0.22;
    leftLabEls[i].classList.toggle('faded', !keep);
  });
  rightNodeEls.forEach((g,j)=>{
    const keep = sel.side==='R' ? (j===sel.idx) : opp.has(j);
    g.querySelector('rect').style.opacity = keep?1:0.22;
    rightLabEls[j].classList.toggle('faded', !keep);
  });
  // caption
  const total = sel.side==='L' ? OTOT[sel.idx] : TTOT[sel.idx];
  const nm = sel.side==='L' ? O[sel.idx] : T[sel.idx];
  const parts = brk.map(([n,v])=>n+' '+v).join(' · ');
  if(sel.side==='L')
    cap.innerHTML='<b>'+nm+' 출신 '+total+'명</b><span class="arrow">→</span>'+parts;
  else
    cap.innerHTML='<b>'+nm+' 연구 '+total+'명</b><span class="arrow">←</span>'+parts;
}

function pick(side,idx){
  if(sel && sel.side===side && sel.idx===idx) sel=null;
  else sel={side,idx};
  render();
}
[...leftNodeEls,...rightNodeEls].forEach(g=>{
  g.addEventListener('click',e=>{e.stopPropagation(); pick(g.dataset.side, +g.dataset.idx);});
});
ribEls.forEach(p=>{
  p.addEventListener('click',e=>{e.stopPropagation(); pick('L', +p.dataset.o);});
});
resetBtn.addEventListener('click',()=>{sel=null;render();});

// tooltip
const tip=document.getElementById('skTip'), plot=document.getElementById('skPlot');
function moveTip(e){
  const pr=plot.getBoundingClientRect();
  let x=e.clientX-pr.left+12, y=e.clientY-pr.top+12;
  tip.style.left=Math.min(x, pr.width-tip.offsetWidth-6)+'px';
  tip.style.top=y+'px';
}
ribEls.forEach(p=>{
  p.addEventListener('mouseenter',e=>{
    tip.innerHTML='<b>'+O[+p.dataset.o]+'</b> → <b>'+T[+p.dataset.t]+'</b><br>'+p.dataset.v+'명';
    tip.classList.add('show'); moveTip(e);
  });
  p.addEventListener('mousemove',moveTip);
  p.addEventListener('mouseleave',()=>tip.classList.remove('show'));
});

render();
</script>
</body>
</html>
